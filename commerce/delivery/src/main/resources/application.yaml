spring:
  application:
    name: delivery
  config:
    import: "configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        useRandomPolicy: true
        max-interval: 6000

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: localhost
    instance-id: "${spring.application.name}:${random.value}"
    leaseRenewalIntervalInSeconds: 10

logging:
  level:
    ru.yandex.practicum: INFO
    org:
      springframework: ERROR
      apache.kafka: ERROR

decimal:
  baseRate: 5.0
  warehouse1AddressMultiplier: 1
  warehouse2AddressMultiplier: 2
  fragileMultiplier: 0.2
  weightMultiplier: 0.3
  volumeMultiplier: 0.2
  streetMultiplier: 0.2